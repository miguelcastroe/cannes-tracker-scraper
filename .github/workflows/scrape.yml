name: Run Cannes Tracker Scraper

on:
  workflow_dispatch: # Allows you to run this manually with a single click

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Cloud Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright pandas lxml

    - name: Install Cloud Browser Binaries
      run: |
        playwright install chromium

    - name: Run Scraper Script
      run: |
        python scraper.py

    - name: Upload Scraped CSV File
      uses: actions/upload-artifact@v4
      with:
        name: cannes-2026-data-csv
        path: cannes_2026_data.csv
